<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#3f0071,#6a0dad,#9d4edd,#c77dff);
padding:20px;
}

.login-box{

width:100%;
max-width:1000px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(20px);

border-radius:25px;

overflow:hidden;

box-shadow:0 20px 50px rgba(0,0,0,.35);

}

.left{

background:linear-gradient(180deg,#5A189A,#7B2CBF);

display:flex;
justify-content:center;
align-items:center;
padding:30px;
min-height:500px;

}

.left img{

width:100%;
max-width:320px;

border-radius:20px;

box-shadow:0 15px 30px rgba(0,0,0,.4);

object-fit:cover;

}

.right{

background:rgba(255,255,255,.08);

display:flex;

flex-direction:column;

justify-content:center;

padding:50px;

color:white;

}

h2{

font-weight:bold;

margin-bottom:10px;

}

p{

opacity:.8;

margin-bottom:25px;

}

.form-control{

height:55px;

border-radius:50px;

padding-left:20px;

font-size:18px;

border:none;

}

.form-control:focus{

box-shadow:0 0 15px #c77dff;

}

.btn-login{

margin-top:20px;

height:55px;

border-radius:50px;

font-size:18px;

font-weight:bold;

background:white;

color:#6a0dad;

border:none;

transition:.3s;

}

.btn-login:hover{

transform:translateY(-3px);

background:#EBD8FF;

}

@media(max-width:768px){

.left{

min-height:250px;

}

.right{

padding:30px;

}

}

.btn-back{

margin-top:15px;
height:55px;
border-radius:50px;
font-size:18px;
font-weight:bold;

background:transparent;
color:white;

border:2px solid white;

transition:.3s;

}

.btn-back:hover{

background:white;
color:#6a0dad;
transform:translateY(-3px);

}
</style>

</head>

<body>

<div class="login-box">

<div class="row g-0">

<div class="col-md-6 left">

<!-- PALITAN MO LANG ANG LARAWAN -->
<img src="iconHmm.png" alt="Couple">

</div>

<div class="col-md-6 right">

<h2>💜 What is our anniversary?</h2>

<p>Enter 8 digits.</p>

<input
type="password"
id="passkey"
class="form-control"
placeholder="Enter Passkey">

<button
class="btn btn-login"
onclick="login()">
Unlock ❤️
</button>

<button
class="btn btn-back"
onclick="goBack()">
⬅ Back
</button>

</div>

</div>

</div>

<script>

function goBack(){

Swal.fire({
title:"Go Back?",
text:"Return to the homepage?",
icon:"question",
showCancelButton:true,
confirmButtonColor:"#6a0dad",
cancelButtonText:"No",
confirmButtonText:"Yes"
}).then((result)=>{

if(result.isConfirmed){
window.location.href="index.html";
}

});

}

function login(){

const pass=document.getElementById("passkey").value;

const correct="0707"+new Date().getFullYear();

if(pass===correct){

Swal.fire({
    imageUrl: "iconsuccess.png",
    imageWidth: 150,
    imageHeight: 150,
    imageAlt: "Love",
    title: "I LOVE YOU ❤️",
    text: "Happy Anniversary Bebi",
    confirmButtonColor: "#6a0dad"
}).then(() => {
    window.location = "gallery.html";
});

}else{

Swal.fire({
    imageUrl: "iconcute.png",
    imageWidth: 150,
    imageHeight: 150,
    imageAlt: "Wrong",
    title: "Oops!",
    text: "Tama ka... pero di 'yan ang date natin.",
    confirmButtonColor: "#6a0dad"
});

}

}

</script>

</body>
</html>
